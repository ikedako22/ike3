<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所沢名所ナビ — Tokorozawa Discovery</title>
    <style>
        :root {
            --primary-color: #2d5a27;
            --accent-color: #e91e63;
            --bg-color: #f4f7f4;
            --text-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://picsum.photos/id/311/1200/600') center/cover;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .spot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
        }

        .card h3 {
            color: var(--primary-color);
            margin: 0 0 10px 0;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }

        .info-box {
            background: #f0f4f0;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .info-box span {
            display: block;
            margin-bottom: 5px;
        }

        .map-container {
            width: 100%;
            height: 250px;
            background: #eee;
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }

        @media (max-width: 600px) {
            .spot-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>所沢名所ナビ</h1>
    <p>空と文化と、ベースボール。</p>
</header>

<div class="container">
    <div class="spot-grid">
        <article class="card">
            <div class="card-content">
                <h3>所沢航空記念公園</h3>
                <div class="info-box">
                    <span><strong>最寄り駅：</strong> 西武新宿線「航空公園駅」</span>
                    <span><strong>徒歩：</strong> 東口からすぐ</span>
                </div>
                <p>日本の航空発祥の地。YS-11中型旅客機の展示がある開放的な公園です。</p>
            </div>
            <div class="map-container">
                <iframe src="https://maps.google.co.jp/maps?output=embed&q=35.7981,139.4711&z=15&t=m" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </article>

        <article class="card">
            <div class="card-content">
                <h3>ところざわサクラタウン</h3>
                <div class="info-box">
                    <span><strong>最寄り駅：</strong> JR武蔵野線「東所沢駅」</span>
                    <span><strong>徒歩：</strong> 徒歩約10分</span>
                </div>
                <p>角川武蔵野ミュージアムがランドマークの文化複合施設です。</p>
            </div>
            <div class="map-container">
                <iframe src="https://maps.google.co.jp/maps?output=embed&q=35.7960,139.5085&z=15&t=m" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </article>

        <article class="card">
            <div class="card-content">
                <h3>ベルーナドーム（西武球場）</h3>
                <div class="info-box">
                    <span><strong>最寄り駅：</strong> 西武狭山線・山口線「西武球場前駅」</span>
                    <span><strong>徒歩：</strong> 改札を出てすぐ</span>
                </div>
                <p>埼玉西武ライオンズの本拠地。豊かな自然に囲まれた、ドーム球場ながら壁のない開放的な構造が特徴です。</p>
            </div>
            <div class="map-container">
                <iframe src="https://maps.google.co.jp/maps?output=embed&q=35.7687,139.4205&z=15&t=m" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </article>
    </div>
</div>

<footer>
    <p>© 2026 所沢名所ナビ</p>
</footer>

</body>
</html>
